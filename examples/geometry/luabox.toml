[package]
name = "geometry"
version = "0.1.0"
edition = "5.4"

[build]
target = "5.4"
out = "dist"

[types]
strict = true
shape-paths = ["shapes"]
# The type entrypoint (TS-style): the `export type` declarations in this file
# form the package's published surface. A dependent addresses them under the
# package name — `geometry.Shape`, `geometry.Point` (see ../renderer).
entry = "shapes/geometry.luab"

