[package]
name = "renderer"
version = "0.1.0"
edition = "5.1"

[build]
target = "5.1"
out = "dist"

[types]
strict = true
# Ambient LuaCATS definitions, resolved from defs/ under THIS package's own
# root only (see defs/geometry.d.lua for why geometry's classes are
# hand-vendored here rather than referenced from the dependency).
defs = ["geometry", "render"]

[dependencies]
# A path dependency on the sibling library. Run `luabox install` once to
# resolve it into luabox.lock (committed — this is an application). Note:
# this dependency is still needed at runtime (`require`) and for
# `luabox install`/lockfile purposes — it does NOT make geometry's LuaCATS
# types ambient here (see defs/geometry.d.lua).
geometry = { path = "../geometry" }

[tasks]
start = "luabox run src/main.lua"
