# Build with a JDK 17+ toolchain (IntelliJ Platform Gradle Plugin 2.x + IDE
# 2024.2 require it). Java 8 will NOT build this plugin.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
org.gradle.caching=true
org.gradle.configuration-cache=true

# The IntelliJ Platform Gradle Plugin needs this to allow downloading the
# platform from the JetBrains cache/CDN.
org.gradle.parallel=true
