[package]
name = "asteroids-lite"
version = "0.1.0"
edition = "5.1"       # LÖVE runs LuaJIT (5.1-compatible)

[build]
mode = "love"         # `luabox build` packages a .love archive (mode implies bundling)
out = "dist"

[types]
strict = true
defs = ["love2d"]     # ambient LÖVE API types from defs/love2d.d.lua

