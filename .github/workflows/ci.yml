name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # Belt-and-braces: the workspace declares [workspace.lints.clippy] with
      # `all`/`pedantic` at warn, but env RUSTFLAGS=-Dwarnings only denies
      # *rustc* warnings — clippy's own lints need `-- -D warnings` to become
      # hard errors, otherwise a pedantic finding passes CI silently.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # SPEC.md §16.1 — perf gates are CI-blocking: cold start < 50 ms, and
  # (until `luabox check` lands, ticket #6) a `fmt --check` throughput
  # proxy on a ~100-kLOC synthetic corpus < 2 s warm. See
  # scripts/perf-gate.sh for the harness and how to flip on the real
  # `check` gate.
  perf-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: perf-gates
      - run: bash scripts/perf-gate.sh

  # Every example project under examples/ must pass check + fmt --check + lint
  # cleanly against the real binary, plus its per-example extras (install,
  # build, bundle, .love packaging, tests). See scripts/examples.sh.
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: examples
      - run: cargo build --release --bin luabox
      - name: Install Lua 5.1 and unzip
        run: sudo apt-get update && sudo apt-get install -y lua5.1 unzip
      - run: bash scripts/examples.sh
