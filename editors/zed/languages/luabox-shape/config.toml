name = "LuaBox Shape"
grammar = "luab"
path_suffixes = ["luab"]
line_comments = ["// "]

# Auto-close pairs for the shape DSL.
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = false },
  { start = "<", end = ">", close = true, newline = false },
]
