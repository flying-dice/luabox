name: Fuzz

# Parser fuzzing (SPEC.md §16.1, §16.2). cargo-fuzz/libFuzzer needs a
# sanitizer-friendly toolchain, so this runs on ubuntu only — Windows +
# libFuzzer is unreliable and not a CI execution target (see
# crates/luabox-syntax fuzz targets under fuzz/ for local notes).
#
# PRs get a quick smoke run per target (60s); the weekly schedule gets a
# deeper run (600s) with a persisted corpus so coverage compounds over time.

on:
  pull_request:
    paths:
      - "crates/luabox-syntax/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    # Sundays at 03:17 UTC — off-peak, deliberately not top-of-hour.
    - cron: "17 3 * * 0"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [lua_parse, lua_fmt, shape_parse, luacats]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> target

      - name: Cache cargo-fuzz binary
        id: cargo-fuzz-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          # Bump the trailing version tag to force a reinstall.
          key: cargo-fuzz-${{ runner.os }}-v1

      - name: Install cargo-fuzz
        if: steps.cargo-fuzz-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Determine fuzz duration
        id: duration
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "seconds=600" >> "$GITHUB_OUTPUT"
          else
            echo "seconds=60" >> "$GITHUB_OUTPUT"
          fi

      - name: Fuzz ${{ matrix.target }}
        working-directory: fuzz
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ steps.duration.outputs.seconds }} \
            -error_exitcode=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
