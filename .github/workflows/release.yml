name: release

# Cut a GitHub Release for a pushed `v*` tag: publish the release (notes lifted
# from CHANGELOG.md), build the cross-platform `luabox` binaries, attach them
# with SHA256SUMS and the install scripts, smoke the just-uploaded artifacts on
# all three OSes, and only then mark the release `--latest`. (The VS Code
# extension lives in flying-dice/luabox-vscode and releases its own .vsix.)
#
# Everything happens in this ONE workflow run, triggered by the tag push — not
# via an `on: release` trigger. A release created here with GITHUB_TOKEN would
# NOT fire a downstream `release: published` workflow (GitHub suppresses
# token-raised events), so the whole pipeline is chained by `needs:` instead.
#
# The install scripts (scripts/install.sh, scripts/install.ps1) download
# `luabox-<target>.{tar.gz,zip}` from a release pinned by LUABOX_VERSION, so
# attaching these assets and — after smoke passes — marking the release latest
# is what makes `curl … | bash` / `irm … | iex` work.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# Never run two release pipelines for the same tag concurrently; do not cancel
# an in-flight one (a half-published release is worse than a slow one).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Publish the release up front so the build/publish/smoke jobs have a
  # target to attach to and download from. Deliberately NOT marked latest yet
  # (`--latest=false`) — that is gated behind `smoke` and done by `mark-latest`,
  # so a release only goes live after its freshly-built artifacts install and
  # run on all three OSes. `--draft=false` so smoke can download the uploaded
  # install script from the public release-download URL.
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${TAG#v}"
          # Print the `## [x.y.z] - DATE` block (Keep a Changelog format — see
          # CHANGELOG.md / RELEASING.md) up to the next `## [` header.
          awk -v ver="$version" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md || echo "(no CHANGELOG.md entry found for ${version})" > release-notes.md
          echo "--- release notes ---"
          cat release-notes.md
      - name: Create the GitHub Release (not latest yet)
        run: |
          gh release create "$TAG" \
            --title "luabox $TAG" \
            --notes-file release-notes.md \
            --draft=false \
            --latest=false

  # Build native release binaries for the tagged commit. Runner arch is
  # load-bearing: macos-latest is Apple Silicon (aarch64-apple-darwin). Intel
  # macOS (x86_64-apple-darwin) is not shipped — keep it out of the installer too.
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest   # Apple Silicon only
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      # Match rust-toolchain.toml (1.92.0) and the repo's other workflows.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # `--locked`: build from the committed Cargo.lock exactly, so a release
      # binary is bit-reproducible against the tagged tree and never silently
      # picks up a newer transitive dep.
      - name: Build
        run: cargo build --release --locked -p luabox-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -czf "dist/luabox-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" luabox
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/luabox.exe" -DestinationPath "dist/luabox-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: luabox-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # The VS Code extension lives in its own repo (flying-dice/luabox-vscode)
  # and ships its .vsix from that repo's releases — no vsix job here.

  # Checksum the binaries and attach them, SHA256SUMS, and the install
  # scripts to the release. Does NOT mark the release latest — that is gated
  # behind `smoke` and performed by `mark-latest`.
  publish:
    name: Upload assets
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum luabox-*.tar.gz luabox-*.zip > SHA256SUMS
          cat SHA256SUMS
      - name: Upload assets to release
        run: |
          gh release upload "$TAG" \
            dist/luabox-*.tar.gz dist/luabox-*.zip dist/SHA256SUMS \
            scripts/install.sh scripts/install.ps1 \
            --clobber

  # Gate: on each OS, install the just-uploaded binary via the just-uploaded
  # install script (pinned to the tag via LUABOX_VERSION — no `latest`
  # resolution, since the release is deliberately not latest yet), assert it
  # runs and reports the tag version, then scaffold a probe project and assert
  # `luabox check` flags a deliberate type error (LB0300) non-zero and passes a
  # clean file. Then a battery of hardening probes a real user would hit:
  #   - `luabox lsp` answers an `initialize` handshake (the whole VS Code
  #     extension is dead if it doesn't),
  #   - functional surfaces (`--help`, `explain`, `fmt --check`, `lint`, `doc`),
  #   - the binary's own self-replace (`luabox upgrade <tag>`), plus its
  #     negative (a nonexistent tag must fail non-zero),
  #   - the installer into a path CONTAINING A SPACE (quoting bugs), plus its
  #     negative (a nonexistent version must fail non-zero, not silently pass).
  # All three legs must pass before the release goes live. No token:
  # release-download URLs are public.
  smoke:
    name: Smoke ${{ matrix.os }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    steps:
      # Unix (Linux + macOS): run the uploaded install.sh pinned to the tag,
      # then exercise the binary and a probe project.
      - name: Smoke (unix)
        if: matrix.shell == 'bash'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Install via the uploaded install.sh asset, pinned to the tag.
          # LUABOX_VERSION=<tag> pins the release (no /releases/latest lookup).
          curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/install.sh" \
            | LUABOX_VERSION="${TAG}" bash

          # install.sh installs to $HOME/.luabox/bin by default.
          export PATH="$HOME/.luabox/bin:$PATH"

          # Version must match the tag (strip leading 'v': v0.1.0 -> "0.1.0").
          ver_out="$(luabox --version)"
          echo "version: $ver_out"
          expected="${TAG#v}"
          if ! printf '%s' "$ver_out" | grep -qE "(^| )${expected}( |$)"; then
            echo "error: 'luabox --version' = '$ver_out', expected to contain '$expected'" >&2
            exit 1
          fi

          # Scaffold a probe project with a deliberate type error.
          work="$(mktemp -d)"
          mkdir -p "$work/src"
          cat > "$work/luabox.toml" <<'TOML'
          [package]
          name = "smoke"
          version = "0.1.0"
          edition = "5.4"

          # Strict mode makes LB0300 an error (nonzero exit); without it the
          # type mismatch is a warning and `luabox check` exits 0.
          [types]
          strict = true
          TOML
          cat > "$work/src/main.lua" <<'LUA'
          ---@param name string
          ---@return string
          local function greet(name)
              return "Hello, " .. name .. "!"
          end

          print(greet(42))
          LUA
          cd "$work"

          # The deliberate type error must fail `luabox check` non-zero, with
          # LB0300 (type mismatch) in the output.
          if check_out="$(luabox check 2>&1)"; then
            echo "$check_out"
            echo "error: 'luabox check' passed on a type-error project (expected failure)" >&2
            exit 1
          fi
          echo "$check_out"
          if ! printf '%s' "$check_out" | grep -q 'LB0300'; then
            echo "error: expected LB0300 in 'luabox check' output" >&2
            exit 1
          fi

          # Fix the error: a clean file must pass (exit 0).
          cat > src/main.lua <<'LUA'
          ---@param name string
          ---@return string
          local function greet(name)
              return "Hello, " .. name .. "!"
          end

          print(greet("world"))
          LUA
          luabox check

          # Auth status with no token/keychain on a fresh runner: `whoami`
          # must report not-signed-in and exit 0 (a status query, no network).
          who="$(luabox whoami)"
          echo "whoami: $who"
          if [ "$who" != "not signed in" ]; then
            echo "error: 'luabox whoami' = '$who', expected 'not signed in'" >&2
            exit 1
          fi

          # Exercise self-replace on this OS: re-install the same tag via the
          # binary's own upgrade command, then prove it still runs.
          luabox upgrade "${TAG}"
          luabox --version

          # ── Upgrade negative probe ─────────────────────────────────────
          # Failure mode: a self-update that silently "succeeds" on a
          # nonexistent target would leave users convinced they upgraded when
          # they did not. Run under `if` so set -e does not abort on the
          # expected failure.
          if luabox upgrade "v0.0.0-does-not-exist"; then
            echo "error: 'luabox upgrade' succeeded for a nonexistent version" >&2
            exit 1
          fi
          echo "negative upgrade probe: correctly failed"

          # ── Negative install probe ─────────────────────────────────────
          # Failure mode: install.sh silently exiting 0 when the pinned release
          # does not exist would ship a broken install path. The script itself
          # downloads fine (it is our real tag asset); the pinned nonexistent
          # VERSION must make it exit non-zero.
          if curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/install.sh" \
            | LUABOX_VERSION="v0.0.0-does-not-exist" bash; then
            echo "error: install.sh succeeded for a nonexistent version" >&2
            exit 1
          fi
          echo "negative install probe: install.sh correctly failed"

          # ── Install-dir-with-spaces leg ────────────────────────────────
          # Failure mode: an unquoted $INSTALL_DIR / mkdir / mv in install.sh
          # word-splits on a space and drops the binary in the wrong place (or
          # fails). Re-install into a path with a space and assert the exe
          # landed and runs from there.
          spaced_dir="$(mktemp -d)/luabox smoke dir"
          curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/install.sh" \
            | LUABOX_INSTALL_DIR="$spaced_dir" LUABOX_VERSION="${TAG}" bash
          if [ ! -x "$spaced_dir/luabox" ]; then
            echo "error: install.sh did not place an executable in a spaced dir" >&2
            exit 1
          fi
          "$spaced_dir/luabox" --version

          # ── Broader functional probes ──────────────────────────────────
          # Cheap, deterministic exercises of surfaces users hit daily. Failure
          # mode: a build where the top-level CLI, the explain registry, or the
          # fmt/lint/doc pipelines are broken would still pass the check probe.
          luabox --help >/dev/null                       # must exit 0
          explain_out="$(luabox explain LB0300)"
          if ! printf '%s' "$explain_out" | grep -qi 'type mismatch'; then
            echo "error: 'luabox explain LB0300' missing 'type mismatch'" >&2
            printf '%s\n' "$explain_out" >&2
            exit 1
          fi
          # Scaffold a fresh (canonical) project so the fmt/lint/doc probes test
          # the tools, not this script's hand-written whitespace.
          clean="$(mktemp -d)/clean"
          mkdir -p "$clean"
          (cd "$clean" && luabox init)
          cd "$clean"
          luabox fmt          # canonicalize in place, then assert idempotency:
          luabox fmt --check  # must exit 0 on already-formatted sources
          luabox lint         # must exit 0 on a clean project
          luabox doc          # must exit 0 and produce doc/index.html
          if [ ! -f doc/index.html ]; then
            echo "error: 'luabox doc' produced no doc/index.html" >&2
            exit 1
          fi

          # ── LSP handshake smoke ────────────────────────────────────────
          # Failure mode: the VS Code extension is worthless if `luabox lsp`
          # does not answer. Spawn it, send a Content-Length-framed initialize,
          # and assert the reply advertises "capabilities". A 15s hard cap means
          # a hung server FAILS the job instead of hanging it.
          lsp_py="$(mktemp)"
          cat > "$lsp_py" <<'PY'
          import json, subprocess, sys, threading
          exe = sys.argv[1]
          p = subprocess.Popen([exe, "lsp"], stdin=subprocess.PIPE,
                               stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          def frame(obj):
              b = json.dumps(obj).encode("utf-8")
              return b"Content-Length: %d\r\n\r\n" % len(b) + b
          def send(obj):
              p.stdin.write(frame(obj)); p.stdin.flush()
          def read_message(s):
              hdr = b""
              while b"\r\n\r\n" not in hdr:
                  c = s.read(1)
                  if not c:
                      return None
                  hdr += c
              n = None
              for line in hdr.split(b"\r\n"):
                  if line.lower().startswith(b"content-length:"):
                      n = int(line.split(b":", 1)[1].strip())
              return s.read(n) if n is not None else None
          out = {}
          def work():
              try:
                  send({"jsonrpc": "2.0", "id": 1, "method": "initialize",
                        "params": {"processId": None, "rootUri": None, "capabilities": {}}})
                  out["body"] = read_message(p.stdout)
              except Exception as e:
                  out["err"] = repr(e)
          t = threading.Thread(target=work); t.daemon = True; t.start(); t.join(15)
          if t.is_alive():
              p.kill(); sys.exit("error: luabox lsp initialize timed out (hung server)")
          if out.get("err"):
              p.kill(); sys.exit("error: luabox lsp handshake failed: " + out["err"])
          body = out.get("body")
          if not body or b'"capabilities"' not in body:
              p.kill(); sys.exit("error: initialize reply missing capabilities: %r" % (body,))
          print("LSP OK:", body[:120])
          try:
              send({"jsonrpc": "2.0", "id": 2, "method": "shutdown", "params": None})
              send({"jsonrpc": "2.0", "method": "exit"})
              p.wait(timeout=5)
          except Exception:
              p.kill()
          PY
          python3 "$lsp_py" "$(command -v luabox)"

      # Windows: run the uploaded install.ps1 pinned to the tag, then exercise
      # the binary and a probe project.
      - name: Smoke (windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $ProgressPreference = "SilentlyContinue"

          $tag  = $env:TAG
          $repo = $env:REPO

          # Download the uploaded install.ps1 to a file and run it (file-based, so
          # a script parse error surfaces clearly and the shipped env-var path is
          # used).
          $ps1 = Join-Path $env:RUNNER_TEMP "install.ps1"
          Invoke-WebRequest -Uri "https://github.com/$repo/releases/download/$tag/install.ps1" `
            -OutFile $ps1 -UseBasicParsing

          # Run the installer. install.ps1 is a PowerShell script (not an external
          # exe), so $LASTEXITCODE is unreliable after `& $ps1`; rely on
          # $ErrorActionPreference=Stop for throws and assert the binary landed.
          $env:LUABOX_VERSION = $tag
          & $ps1

          # install.ps1 installs to $env:USERPROFILE\.luabox\bin by default.
          $binDir = Join-Path $env:USERPROFILE ".luabox\bin"
          $exe = Join-Path $binDir "luabox.exe"
          if (-not (Test-Path $exe)) { Write-Error "install.ps1 did not produce $exe"; exit 1 }

          # Re-run the installer the way users invoke it: `irm | iex` in an
          # interactive Windows PowerShell 5.1 console. REPL mode loads
          # PSReadLine, whose 2.0 DLL embeds a stub of
          # System.Runtime.InteropServices.RuntimeInformation that shadows the
          # real type — an arch-detection failure class the file-based run above
          # cannot catch. This pass ALSO installs into a path CONTAINING A SPACE
          # (highest-risk on Windows). Failure mode: an unquoted $InstallDir /
          # Join-Path in install.ps1 would drop the exe or fail here, not in
          # prod. The remaining probes then run from this spaced install.
          $spacedDir = Join-Path $env:RUNNER_TEMP "luabox smoke dir"
          "`$env:LUABOX_INSTALL_DIR = '$spacedDir'; `$env:LUABOX_VERSION = '$tag'; Get-Content -Raw '$ps1' | iex" | powershell.exe -NoProfile -
          if ($LASTEXITCODE -ne 0) { Write-Error "REPL-mode (5.1) spaced-dir install failed"; exit 1 }
          $spacedExe = Join-Path $spacedDir "luabox.exe"
          if (-not (Test-Path $spacedExe)) { Write-Error "install.ps1 did not produce $spacedExe (spaced dir)"; exit 1 }
          & $spacedExe --version   # exe must launch from a path with a space
          if ($LASTEXITCODE -ne 0) { Write-Error "luabox.exe failed to run from a spaced dir"; exit 1 }
          $binDir = $spacedDir
          $env:PATH = "$binDir;$env:PATH"

          # Version must match the tag (strip leading 'v').
          $verOut   = (luabox --version)
          Write-Host "version: $verOut"
          $expected = $tag.TrimStart('v')
          if ($verOut -notmatch "(^|\s)$([regex]::Escape($expected))(\s|`$)") {
            Write-Error "'luabox --version' = '$verOut', expected to contain '$expected'"
            exit 1
          }

          # Scaffold a probe project with a deliberate type error.
          $work = Join-Path $env:RUNNER_TEMP "smoke-proj"
          New-Item -ItemType Directory -Force -Path (Join-Path $work "src") | Out-Null
          @"
          [package]
          name = "smoke"
          version = "0.1.0"
          edition = "5.4"

          # Strict mode makes LB0300 an error (nonzero exit); without it the
          # type mismatch is a warning and luabox check exits 0.
          [types]
          strict = true
          "@ | Set-Content -Path (Join-Path $work "luabox.toml") -Encoding utf8
          @"
          ---@param name string
          ---@return string
          local function greet(name)
              return "Hello, " .. name .. "!"
          end

          print(greet(42))
          "@ | Set-Content -Path (Join-Path $work "src\main.lua") -Encoding utf8
          Set-Location $work

          # The deliberate type error must fail `luabox check` non-zero, with
          # LB0300 in the output.
          $checkOut = (luabox check 2>&1 | Out-String)
          Write-Host $checkOut
          if ($LASTEXITCODE -eq 0) { Write-Error "'luabox check' passed on a type-error project (expected failure)"; exit 1 }
          if ($checkOut -notmatch "LB0300") { Write-Error "expected LB0300 in 'luabox check' output"; exit 1 }

          # Fix the error: a clean file must pass (exit 0).
          @"
          ---@param name string
          ---@return string
          local function greet(name)
              return "Hello, " .. name .. "!"
          end

          print(greet("world"))
          "@ | Set-Content -Path (Join-Path $work "src\main.lua") -Encoding utf8
          luabox check
          if ($LASTEXITCODE -ne 0) { Write-Error "'luabox check' failed on a clean project"; exit 1 }

          # Auth status with no token/keychain on a fresh runner: `whoami` must
          # report not-signed-in and exit 0 (a status query, no network).
          $who = (luabox whoami)
          Write-Host "whoami: $who"
          if ($who -ne "not signed in") { Write-Error "'luabox whoami' = '$who', expected 'not signed in'"; exit 1 }

          # Exercise self-replace on Windows (the rename-aside path): re-install
          # the same tag via the binary's own upgrade command.
          luabox upgrade $env:TAG
          if ($LASTEXITCODE -ne 0) { Write-Error "luabox upgrade failed"; exit 1 }

          # Binary still works after self-replace.
          luabox --version
          if ($LASTEXITCODE -ne 0) { Write-Error "luabox --version failed post-upgrade"; exit 1 }

          # ── Upgrade negative probe ─────────────────────────────────────
          # Failure mode: a self-update that silently "succeeds" on a
          # nonexistent target convinces users they upgraded when they did not.
          # Tolerate BOTH a non-zero exit and a thrown terminating error (pwsh
          # 7.4 can turn a native command's stderr + non-zero exit into a throw
          # under $ErrorActionPreference=Stop).
          $upFailed = $false
          try {
            luabox upgrade "v0.0.0-does-not-exist" 2>&1 | Out-String | Write-Host
            if ($LASTEXITCODE -ne 0) { $upFailed = $true }
          } catch { $upFailed = $true }
          if (-not $upFailed) { Write-Error "'luabox upgrade' succeeded for a nonexistent version"; exit 1 }
          Write-Host "negative upgrade probe: correctly failed"

          # ── Negative install probe ─────────────────────────────────────
          # Failure mode: install.ps1 silently exiting 0 when the pinned release
          # does not exist would ship a broken install path. Run in a CHILD
          # process so its `exit 1` yields a clean $LASTEXITCODE and the expected
          # failure does not trip $ErrorActionPreference=Stop in this step.
          "`$env:LUABOX_VERSION = 'v0.0.0-does-not-exist'; & '$ps1'" | powershell.exe -NoProfile -
          if ($LASTEXITCODE -eq 0) { Write-Error "install.ps1 succeeded for a nonexistent version"; exit 1 }
          Write-Host "negative install probe: install.ps1 correctly failed with exit $LASTEXITCODE"

          # ── Broader functional probes ──────────────────────────────────
          # Cheap, deterministic exercises of surfaces users hit daily. Failure
          # mode: a build where the top-level CLI, the explain registry, or the
          # fmt/lint/doc pipelines are broken would still pass the check probe.
          luabox --help | Out-Null
          if ($LASTEXITCODE -ne 0) { Write-Error "'luabox --help' exited $LASTEXITCODE"; exit 1 }
          $explainOut = (luabox explain LB0300 | Out-String)
          if ($explainOut -notmatch "type mismatch") { Write-Error "'luabox explain LB0300' missing 'type mismatch'"; Write-Host $explainOut; exit 1 }
          # Scaffold a fresh (canonical) project so fmt/lint/doc test the tools,
          # not this script's hand-written whitespace.
          $clean = Join-Path $env:RUNNER_TEMP "clean-proj"
          New-Item -ItemType Directory -Force -Path $clean | Out-Null
          Set-Location $clean
          luabox init
          if ($LASTEXITCODE -ne 0) { Write-Error "luabox init failed"; exit 1 }
          luabox fmt          # canonicalize in place, then assert idempotency:
          if ($LASTEXITCODE -ne 0) { Write-Error "luabox fmt failed"; exit 1 }
          luabox fmt --check  # must exit 0 on already-formatted sources
          if ($LASTEXITCODE -ne 0) { Write-Error "'luabox fmt --check' failed on canonical sources"; exit 1 }
          luabox lint         # must exit 0 on a clean project
          if ($LASTEXITCODE -ne 0) { Write-Error "'luabox lint' failed on a clean project"; exit 1 }
          luabox doc          # must exit 0 and produce doc/index.html
          if ($LASTEXITCODE -ne 0) { Write-Error "'luabox doc' failed"; exit 1 }
          if (-not (Test-Path (Join-Path $clean "doc\index.html"))) { Write-Error "'luabox doc' produced no doc/index.html"; exit 1 }

          # ── LSP handshake smoke ────────────────────────────────────────
          # Failure mode: the VS Code extension is worthless if `luabox lsp`
          # does not answer. Spawn it, send a Content-Length-framed initialize,
          # and assert the reply advertises "capabilities". Python's buffered
          # binary pipes (not shell pipes) keep Windows stdio byte-exact; a 15s
          # hard cap means a hung server FAILS the job instead of hanging it.
          $lspPy = Join-Path $env:RUNNER_TEMP "lsp_smoke.py"
          @'
          import json, subprocess, sys, threading
          exe = sys.argv[1]
          p = subprocess.Popen([exe, "lsp"], stdin=subprocess.PIPE,
                               stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          def frame(obj):
              b = json.dumps(obj).encode("utf-8")
              return b"Content-Length: %d\r\n\r\n" % len(b) + b
          def send(obj):
              p.stdin.write(frame(obj)); p.stdin.flush()
          def read_message(s):
              hdr = b""
              while b"\r\n\r\n" not in hdr:
                  c = s.read(1)
                  if not c:
                      return None
                  hdr += c
              n = None
              for line in hdr.split(b"\r\n"):
                  if line.lower().startswith(b"content-length:"):
                      n = int(line.split(b":", 1)[1].strip())
              return s.read(n) if n is not None else None
          out = {}
          def work():
              try:
                  send({"jsonrpc": "2.0", "id": 1, "method": "initialize",
                        "params": {"processId": None, "rootUri": None, "capabilities": {}}})
                  out["body"] = read_message(p.stdout)
              except Exception as e:
                  out["err"] = repr(e)
          t = threading.Thread(target=work); t.daemon = True; t.start(); t.join(15)
          if t.is_alive():
              p.kill(); sys.exit("error: luabox lsp initialize timed out (hung server)")
          if out.get("err"):
              p.kill(); sys.exit("error: luabox lsp handshake failed: " + out["err"])
          body = out.get("body")
          if not body or b'"capabilities"' not in body:
              p.kill(); sys.exit("error: initialize reply missing capabilities: %r" % (body,))
          print("LSP OK:", body[:120])
          try:
              send({"jsonrpc": "2.0", "id": 2, "method": "shutdown", "params": None})
              send({"jsonrpc": "2.0", "method": "exit"})
              p.wait(timeout=5)
          except Exception:
              p.kill()
          '@ | Set-Content -Path $lspPy -Encoding utf8
          $py = if (Get-Command python3 -ErrorAction SilentlyContinue) { "python3" } elseif (Get-Command python -ErrorAction SilentlyContinue) { "python" } else { $null }
          if (-not $py) { Write-Error "no python interpreter available for the LSP smoke"; exit 1 }
          & $py $lspPy $spacedExe
          if ($LASTEXITCODE -ne 0) { Write-Error "LSP handshake smoke failed"; exit 1 }

  # Go-live: mark the release latest, only reachable if all three smoke legs
  # passed. A failed smoke skips this, so the release stays not-latest and the
  # pipeline is red.
  mark-latest:
    name: Mark release latest
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # No checkout in this job, so tell gh which repo to act on.
      GH_REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
    steps:
      # Gate 1 — asset-completeness. Last line of defense before go-live:
      # fetch the release's ACTUAL asset list and assert exactly the expected
      # set is present. Failure mode: `build` uses fail-fast:false, so a single
      # silently-skipped OS build can leave the whole
      # pipeline green while an asset is missing — users on that OS then get a
      # 404 from the installer. This catches it before the release is latest.
      - name: Assert the release has the complete asset set
        run: |
          set -euo pipefail
          names="$(gh api "repos/${GH_REPO}/releases/tags/${TAG}" --jq '.assets[].name' | sort)"
          echo "assets present:"; printf '%s\n' "$names"
          missing=0
          # 3 binaries + SHA256SUMS + both install scripts, by exact name.
          for want in \
            luabox-x86_64-unknown-linux-gnu.tar.gz \
            luabox-aarch64-apple-darwin.tar.gz \
            luabox-x86_64-pc-windows-msvc.zip \
            SHA256SUMS install.sh install.ps1; do
            if ! printf '%s\n' "$names" | grep -qxF "$want"; then
              echo "error: missing required asset: $want" >&2
              missing=1
            fi
          done
          # And no stray extras: the exact set is the 6 fixed names. (The VS
          # Code extension lives in flying-dice/luabox-vscode and ships its
          # .vsix from that repo's own releases.)
          total="$(printf '%s\n' "$names" | grep -c . || true)"
          if [ "$total" -ne 6 ]; then
            echo "error: expected exactly 6 assets, found $total" >&2
            missing=1
          fi
          [ "$missing" -eq 0 ] || { echo "asset-completeness gate failed" >&2; exit 1; }

      # Gate 2 — independent integrity re-verification. Freshly download every
      # binary + SHA256SUMS straight from the published release and run
      # `sha256sum -c`. Failure mode: a truncated/corrupted upload, or a
      # SHA256SUMS computed from different bytes than were actually attached,
      # would pass the per-job upload but hand users a checksum that does not
      # match the file they download. This proves published sums == published
      # bytes, independent of the upload path.
      - name: Re-verify published checksums against freshly downloaded assets
        run: |
          set -euo pipefail
          work="$(mktemp -d)"; cd "$work"
          gh release download "$TAG" \
            --pattern 'luabox-*.tar.gz' \
            --pattern 'luabox-*.zip' \
            --pattern 'SHA256SUMS'
          echo "--- SHA256SUMS ---"; cat SHA256SUMS
          # -c exits non-zero if any listed file is missing or its hash differs.
          sha256sum -c SHA256SUMS

      - name: Mark latest (go live)
        run: gh release edit "$TAG" --latest
