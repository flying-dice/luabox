id = "luabox"
name = "luabox"
version = "0.1.0"
schema_version = 1
authors = ["luabox"]
description = "Lua support via the luabox language server: typecheck, hover, goto-definition, completion, document symbols, formatting and semantic highlighting."
repository = "https://gitlab.beluga-sirius.ts.net/flying-dice/luabox"

# The luabox language server. `languages` lists every language it serves:
#   - "Lua" — Zed's built-in Lua language. Declaring the server here makes it
#             available for Lua automatically (a language's default server list
#             implicitly includes the "..." wildcard), alongside any other Lua
#             server — no user settings edit and no languages/lua/ override
#             required.
# The binary is resolved in src/lib.rs (settings override, then PATH).
[language_servers.luabox]
name = "luabox"
languages = ["Lua"]
